<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 데이터 스튜디오</title>
  <script>
    // 입장 정보가 없으면 입장 페이지로 보낸다.
    // (화면이 잠깐 보였다 사라지는 깜빡임을 막으려고 머리에서 바로 검사한다.
    //  키 이름은 js/auth.js의 KEYS와 같아야 한다.)
    if (!(localStorage.getItem("sds:classId") && localStorage.getItem("sds:groupNo"))) {
      location.replace("./join.html");
    }
  </script>
  <link rel="stylesheet" href="./css/style.css">
  <!-- Firebase 설정값 (커밋되지 않는 파일 — 없으면 연습 모드) -->
  <script src="./js/firebase-config.js"></script>
  <!-- 유일하게 허용된 외부 라이브러리: Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar-title">우리 반 데이터 스튜디오</div>
    <div class="topbar-right">
      <span id="who-label"></span>
      <button id="leave-btn" class="btn tiny ghost" title="학급을 잘못 골랐을 때 눌러요">나가기</button>
    </div>
  </header>
  <nav id="tab-nav" class="tab-nav"></nav>
  <main id="outlet" class="outlet"></main>

  <script type="module">
    // 본 화면 시동 (세션 A). 탭 등록·라우팅만 하고, 내용은 각 모듈이 담당한다.
    import { getSession, leave } from "./js/auth.js";
    import { getClassInfo } from "./js/data.js";
    import { registerTab, startRouter } from "./js/router.js";
    import { mount as mountHome } from "./js/home.js";

    const session = getSession();
    if (!session) {
      // 머리의 검사를 지나쳤어도 여기서 한 번 더 막는다
      location.replace("./join.html");
    } else {
      document.getElementById("who-label").textContent =
        (session.className || "우리 학급") + " · " + session.groupName;

      // ── 탭 등록 ──
      // 홈은 항상 있으므로 먼저 띄우고, 실험 탭은 학급 설정을 읽어 온 뒤 이어 붙인다
      registerTab("home", { label: "🏠 홈", mount: mountHome });
      startRouter({ nav: document.getElementById("tab-nav"), outlet: document.getElementById("outlet") });

      const EXP_LABELS = { 1: "💨 환기 주기", 2: "🌱 식물 광합성", 3: "🏃 운동과 몸", 4: "🔥 비열" };

      // 학급이 켜 둔 실험만 탭으로 만든다 (SPEC §5.2).
      // visibleExps가 없는 학급은 [1,2,3]으로 본다 — 이 기본값이 없으면 탭이 전부 사라진다.
      // 실험 4(비열)는 기본값에 없으므로 교사가 켜야 보인다.
      let visibleExps = [1, 2, 3];
      try {
        const info = await getClassInfo();
        if (Array.isArray(info.visibleExps) && info.visibleExps.length) visibleExps = info.visibleExps;
      } catch (err) {
        // 학급 설정을 못 읽어도 기본 탭은 보여 준다 (수업이 멈추면 안 되므로)
        console.warn("학급 설정을 불러오지 못해 기본 탭을 보여줍니다.", err);
      }

      for (const no of visibleExps) {
        const label = EXP_LABELS[no];
        if (!label) continue; // 모르는 번호는 건너뛴다
        const id = "exp" + no;
        registerTab(id, { label }); // 자리만 먼저 (모듈이 없으면 "준비 중" 화면)
        import(`./js/${id}.js`)
          .then((m) => registerTab(id, { label, mount: m.mount }))
          .catch(() => { /* 담당 세션이 아직 안 만든 탭 */ });
      }

      document.getElementById("leave-btn").addEventListener("click", () => {
        if (confirm("학급에서 나갈까요? 다시 들어오려면 학급 코드가 필요해요.")) {
          leave();
          location.href = "./join.html";
        }
      });
    }
  </script>
</body>
</html>
